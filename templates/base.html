<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Yu-Gi-Oh! Card Identifier{% endblock %}</title>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Cropper.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

  <style>
    /* ── Tokens ───────────────────────────────────────────────────────────── */
    :root {
      --bg:         #f5f2ed;
      --surface:    #ffffff;
      --surface2:   #edeae4;
      --border:     #d6d0c7;
      --border2:    #c4bdb2;
      --ink:        #1a1714;
      --ink-dim:    #6b6460;
      --accent:     #c2410c;
      --accent-lt:  #fff1ec;
      --accent2:    #0369a1;
      --accent2-lt: #e0f2fe;
      --green:      #15803d;
      --green-lt:   #dcfce7;
      --mono:       'DM Mono', monospace;
      --sans:       'DM Sans', sans-serif;
      --display:    'Syne', sans-serif;
      --r:          8px;
      --ease:       220ms cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: .45;
    }

    /* ── Shell ────────────────────────────────────────────────────────────── */
    .shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--ink);
    }
    header h1 {
      font-family: var(--display);
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -.01em; line-height: 1;
    }
    header h1 span { color: var(--accent); }
    .header-sub {
      font-family: var(--mono); font-size: .7rem;
      color: var(--ink-dim); letter-spacing: .1em; text-transform: uppercase;
    }

    /* ── Stage breadcrumb ─────────────────────────────────────────────────── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 36px;
      font-family: var(--mono); font-size: .7rem; letter-spacing: .06em;
    }
    .bc-step {
      padding: 4px 10px; border-radius: 20px;
      background: var(--surface2); color: var(--ink-dim);
      border: 1px solid var(--border);
      white-space: nowrap; transition: var(--ease);
    }
    .bc-step.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .bc-step.done   { background: var(--green-lt); color: var(--green); border-color: var(--green); }
    .bc-arrow { color: var(--border2); font-size: .8rem; }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px 32px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 24px rgba(0,0,0,.04);
    }
    .card-label {
      font-family: var(--mono); font-size: .65rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--ink-dim);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--r);
      font-family: var(--mono); font-size: .78rem;
      font-weight: 500; letter-spacing: .04em;
      border: 1.5px solid transparent;
      cursor: pointer; transition: var(--ease);
      white-space: nowrap;
    }
    .btn-primary  { background: var(--ink);     color: var(--bg); border-color: var(--ink); }
    .btn-primary:hover:not(:disabled)  { background: #2d2926; }
    .btn-primary:disabled              { opacity: .35; cursor: not-allowed; }
    .btn-accent   { background: var(--accent);  color: #fff;      border-color: var(--accent); }
    .btn-accent:hover:not(:disabled)   { background: #9a3308; }
    .btn-accent:disabled               { opacity: .35; cursor: not-allowed; }
    .btn-ghost    { background: transparent;    color: var(--ink); border-color: var(--border2); }
    .btn-ghost:hover                   { border-color: var(--ink); }
    .btn-blue     { background: var(--accent2); color: #fff;      border-color: var(--accent2); }
    .btn-blue:hover:not(:disabled)     { background: #025383; }

    /* ── Spinner ──────────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .65s linear infinite;
    }

    /* ── Error box ────────────────────────────────────────────────────────── */
    .error-box {
      display: none;
      padding: 12px 16px; border-radius: var(--r);
      background: #fef2f2; border: 1px solid #fca5a5;
      color: #b91c1c;
      font-family: var(--mono); font-size: .78rem;
      margin-top: 16px;
    }

    /* ── Stage visibility ─────────────────────────────────────────────────── */
    .stage { display: none; }
    .stage.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stage.active { animation: fadeUp .25s ease forwards; }

    /* ── Stage-specific styles ────────────────────────────────────────────── */
    {% block styles %}{% endblock %}
  </style>
</head>
<body>
<div class="shell">

  <header>
    <h1>Yu-Gi-Oh!<span>Card Detector and Identifier</span></h1>
  </header>

  <div class="breadcrumb">
    <span class="bc-step" id="bc-upload">01 Upload screenshot</span>
    <span class="bc-arrow">›</span>
    <span class="bc-step" id="bc-choose">02 Select a card</span>
    <span class="bc-arrow">›</span>
    <span class="bc-step" id="bc-crop">03 Crop the artwork</span>
    <span class="bc-arrow">›</span>
    <span class="bc-step" id="bc-results">04 Results</span>
  </div>

  {% block content %}{% endblock %}

</div><!-- /shell -->

{% block scripts %}{% endblock %}
</body>
</html>
