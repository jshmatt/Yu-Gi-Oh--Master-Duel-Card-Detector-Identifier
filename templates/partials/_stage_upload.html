<!--stage 1: upload deck image-->


<style>
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--r);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: var(--ease);
    background: var(--surface2);
  }
  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-lt);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.8rem; display: block; margin-bottom: 14px; }
  .upload-zone p { color: var(--ink-dim); margin-top: 6px; font-size: .85rem; }
  .upload-zone strong { color: var(--ink); }

  #preview-wrap { display: none; margin-top: 20px; }
  #preview-img {
    max-height: 200px; max-width: 100%;
    border-radius: 4px; border: 1px solid var(--border);
    display: block; margin: 0 auto;
  }
  #preview-name {
    margin-top: 8px; text-align: center;
    font-family: var(--mono); font-size: .72rem; color: var(--ink-dim);
  }
</style>

<div class="stage active" id="stage-upload">
  <div class="card">
    <div class="card-label">Upload Yu-Gi-Oh! Master Duel Deck Screenshot</div>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*"/>
      <span class="upload-icon">🔬</span>
      <p><strong>Drop an image here</strong> or click to select</p>
      <p>PNG, JPG, WEBP — max 64 MB</p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Preview"/>
      <p id="preview-name"></p>
    </div>

    <div class="error-box" id="upload-error"></div>
  </div>

  <button class="btn btn-primary" id="detect-btn" disabled>
    Run Detection →
  </button>
</div>
